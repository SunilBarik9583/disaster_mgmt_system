version: '3.8'

services:

  mysqldb:
    image: mysql:8
    container_name: mysql-db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: Sunil@9439
      MYSQL_DATABASE: disasterdb

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: disaster-app
    restart: always

    depends_on:
      - mysqldb

    ports:
      - "8086:8086"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysqldb:3306/disasterdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Sunil@9439

volumes:
  mysql_data: